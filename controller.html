<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vissenkom Controller</title>

    <!-- iOS Safari adresbalk kleur -->
    <meta name="theme-color" content="#0b1e2d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="msapplication-navbutton-color" content="#0b1e2d">
    <link rel="stylesheet" href="css/controller.css">
</head>
<body>
    <div class="controller-container">
        <h1>🐟 Vissenkom Controller</h1>

        <!-- Compact Status Dashboard -->
        <div class="status-dashboard" style="display: none;">
            <div class="status-item">
                <div>Voer</div>
                <div id="feedStatus">-</div>
            </div>
            <div class="status-item">
                <div>Medicijn</div>
                <div id="medicineStatus">-</div>
            </div>
            <div class="status-item">
                <div>Poep</div>
                <div id="poopStatus">-</div>
            </div>
            <div class="status-item">
                <div>Water</div>
                <div id="waterStatus">-</div>
            </div>
            <div class="status-item">
                <div>Licht</div>
                <div id="lightStatus">-</div>
            </div>
            <div class="status-item">
                <div>Disco</div>
                <div id="discoStatus">-</div>
            </div>
            <div class="status-item">
                <div>Pomp</div>
                <div id="pumpStatus">-</div>
            </div>
            <div class="status-item">
                <div>Verwarming</div>
                <div id="heatingStatus">-</div>
            </div>
            <div class="status-item">
                <div>Temperatuur</div>
                <div id="temperatureStatus">-</div>
            </div>
            <div class="status-item">
                <div>Vissen</div>
                <div id="fishCountStatus">-</div>
            </div>
            <div class="status-item">
                <div>Ziek</div>
                <div id="sickFishStatus">-</div>
            </div>
        </div>

        <!-- Verzorging -->
        <div class="category-section">
            <h3 class="section-header section-header--care">❤️ Verzorging</h3>
            <div class="controls-grid">
                <button id="feedBtn" class="control-button care-button" disabled>
                    🍤 Voeren
                </button>
                <button id="medicineBtn" class="control-button care-button" disabled>
                    💊 Medicijn toedienen
                </button>
            </div>
        </div>

        <!-- Onderhoud -->
        <div class="category-section">
            <h3 class="section-header section-header--maintenance">✨ Onderhoud</h3>
            <div class="controls-grid">
                <button id="cleanBtn" class="control-button maintenance-button" disabled>
                    💩 Poep opruimen
                </button>
                <button id="refreshWaterBtn" class="control-button maintenance-button" disabled>
                    💧 Water verversen
                </button>
            </div>
        </div>

        <!-- Spel -->
        <div class="category-section">
            <h3 class="section-header section-header--play">🎮 Interactie</h3>
            <div class="controls-grid">
                <button id="tapGlassBtn" class="control-button play-button" disabled>
                    👆 Tik op glas
                </button>
                <button id="playBallBtn" class="control-button play-button" disabled>
                    🎾 Speelbal gooien
                </button>
                <button id="fishingRodBtn" class="control-button play-button" disabled>
                    🎣 Hengel uitgooien
                </button>
                <button id="raceBtn" class="control-button play-button" disabled>
                    🏁 Start race
                </button>
            </div>

            <!-- Race selectie -->
            <div id="raceSelection" class="race-selection" style="display: none;">
                <h3 class="section-header section-header--play">Kies twee vissen voor de race</h3>
                <div class="race-dropdowns">
                    <select id="raceFish1" class="race-select" disabled>
                        <option value="">Kies vis 1...</option>
                    </select>
                    <span class="race-vs">VS</span>
                    <select id="raceFish2" class="race-select" disabled>
                        <option value="">Kies vis 2...</option>
                    </select>
                </div>
                <div class="race-actions">
                    <button id="startRaceBtn" class="control-button play-button" disabled>
                        🏁 Start!
                    </button>
                    <button id="cancelRaceBtn" class="control-button cancel-button">
                        ✕ Annuleren
                    </button>
                </div>
            </div>
        </div>

        <!-- Kom instellingen -->
        <div class="category-section">
            <h3 class="section-header section-header--tank">🏠 Kom</h3>
            <div class="controls-grid">
                <button id="lightBtn" class="control-button tank-button" disabled>
                    🌙 Licht uit
                </button>
                <button id="discoBtn" class="control-button tank-button" disabled>
                    💡🎉 Disco aan
                </button>
                <button id="pumpBtn" class="control-button tank-button" disabled>
                    💨 Pomp aan
                </button>
                <button id="heatingBtn" class="control-button tank-button" disabled>
                    🔥 Verwarming uit
                </button>
            </div>
        </div>

        <!-- Vis toevoegen -->
        <div class="category-section">
            <h3 class="section-header section-header--fish">🐟 Vis toevoegen</h3>
            <div class="add-fish-container">
                <input type="text" id="fishNameInput" placeholder="Naam van je visje..." disabled>
                <button id="addFishBtn" class="control-button fish-button add-fish-btn" disabled>
                    🐟 Toevoegen
                </button>
            </div>
        </div>
    </div>

    <div class="version-display">
        <div class="version-qr-container">
            <div class="version-line">
                Vissenkom v<span id="versionNumber">...</span>
            </div>
            <div class="qr-line">
                <span id="qrValidityStatus" class="qr-validity-status"><span id="qrValidityIcon">🔓</span><span class="qr-label"> QR-code geldigheid:</span> <span id="qrValidityText">geldig</span></span>
            </div>
        </div>
        <div id="footerText" style="text-align: center; margin-top: 10px; opacity: 0.6; font-size: 0.85em;">
        </div>
    </div>

    <script src="js/controller.js"></script>
</body>
</html>
